post:
  summary: register/send-otp
  operationId: authRegisterSendOtp
  tags:
    - auth
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [email, password]
          properties:
            email:
              type: string
              format: email
            password:
              type: string
              format: password
  responses:
    "204": {}
