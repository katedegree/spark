post:
  summary: 新規登録
  operationId: authRegister
  tags:
    - 認証
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [name, email, password]
          properties:
            name:
              type: string
            email:
              type: string
              format: email
            password:
              type: string
              format: password
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            required: [accessToken, refreshToken]
            properties:
              accessToken:
                type: string
                example: "xxxxxxxx.xxxxxxxx.xxxxxxxx"
              refreshToken:
                type: string
                example: "xxxxxxxx.xxxxxxxx.xxxxxxxx"
    "400":
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "408":
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "422":
      content:
        application/json:
          schema:
            $ref: "../../schemas/validation.yaml"
    "429":
      content:
        application/json:
          schema:
            $ref: "../../schemas/error.yaml"
    "500": {}
