post:
  summary: login
  operationId: authLogin
  tags:
    - auth
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [name, email, password]
          properties:
            name:
              type: string
            email:
              type: string
              format: email
            password:
              type: string
              format: password
  responses:
    "200":
      content:
        application/json:
          schema:
            type: object
            required: [accessToken, refreshToken]
            properties:
              accessToken:
                type: string
                example: "xxxxxxxx.xxxxxxxx.xxxxxxxx"
              refreshToken:
                type: string
                example: "xxxxxxxx.xxxxxxxx.xxxxxxxx"
